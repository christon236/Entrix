{% if messages %}
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080; pointer-events: none;">
  {% for message in messages %}
    <div class="toast align-items-center text-bg-{% if message.tags == 'error' %}danger{% elif message.tags == 'warning' %}warning{% elif message.tags == 'success' %}success{% else %}primary{% endif %} border-0 shadow-lg mb-2 entrix-toast fade show" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="3000" style="pointer-events: auto; min-width: 290px; border-radius: 12px; backdrop-filter: blur(10px);">
      <div class="d-flex">
        <div class="toast-body d-flex align-items-center gap-2 py-3 px-3">
          {% if message.tags == 'success' %}
            <i class="bi bi-check-circle-fill fs-5 text-white"></i>
          {% elif message.tags == 'error' %}
            <i class="bi bi-exclamation-triangle-fill fs-5 text-white"></i>
          {% elif message.tags == 'warning' %}
            <i class="bi bi-exclamation-circle-fill fs-5 text-dark"></i>
          {% else %}
            <i class="bi bi-info-circle-fill fs-5 text-white"></i>
          {% endif %}
          <div class="fw-medium text-white {% if message.tags == 'warning' %}text-dark{% endif %}">{{ message }}</div>
        </div>
        <button type="button" class="btn-close {% if message.tags != 'warning' %}btn-close-white{% endif %} me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
      </div>
    </div>
  {% endfor %}
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    const toastElList = document.querySelectorAll('.entrix-toast');
    toastElList.forEach(function (toastEl) {
      if (typeof bootstrap !== 'undefined' && bootstrap.Toast) {
        const toast = new bootstrap.Toast(toastEl, { autohide: true, delay: 3000 });
        toast.show();
      } else {
        setTimeout(function() {
          toastEl.classList.remove('show');
          toastEl.style.transition = 'opacity 0.5s ease';
          toastEl.style.opacity = '0';
          setTimeout(function() { toastEl.remove(); }, 500);
        }, 3000);
      }
    });
  });
</script>
{% endif %}
